services:

  ollama:
    image: ollama/ollama
    container_name: actullm_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    container_name: actullm_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull mistral &&
        ollama pull nomic-embed-text &&
        echo 'Models downloaded successfully'
      "
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"   # ne tourne qu'une fois

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: actullm_api
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: actullm_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data: