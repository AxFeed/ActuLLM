services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: actullm_api
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: actullm_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chroma_data: